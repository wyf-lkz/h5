<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书香指间</title>
    <link rel="stylesheet" href="./css/reset.css">

            overflow: hidden;

        }

            position: absolute;
            float: left;
            width: 100%;
            height: 100%;
            z-index: 4;
        }
        .black-bg{
            filter: brightness(0.3);
        }
    </style>
</head>
<body>

    <div class="bookshowpage">

      <img id="collect-badge-2" class="badge" src="./asset/img/badge-2.png" style="display: none;">
      <img id="collect-badge-3" class="badge" src="./asset/img/badge-3.png" style="display: none;">
      
      <ul id="carousel">
        <li>
            <img src="./asset/img/甲申三百年祭.png" id="pic-book1" class="book">
            <img src="./asset/img/info.png" class="info" id="info-book1">
        </li>
        <li>
            <img src="./asset/img/论人民民主专政.png" id="pic-book2" class="book">
            <img src="./asset/img/info.png" class="info" id="info-book2">
        </li>
        <li>
            <img src="./asset/img/目前形势和我们的任务.png" id="pic-book3" class="book">
            <img src="./asset/img/info.png" class="info" id="info-book3">

      </ul>

    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
          var size={

         })
         $('#collect-bar').css({

            'left':size.width*86/1280+'px',
            'top':size.height*1986/2272+'px',
            'z-index':'2'
         })
         $('#collect-badge-1').css({
            'position':'absolute',  
            'width':size.width*84/1280+'px',
            'height':size.height*108/2272+'px',
            'left':size.width*461/1280+'px',
            'top':size.height*2046/2272+'px',
            'z-index':'2'
         })
         $('#collect-badge-2').css({
            'position':'absolute',  
            'width':size.width*86/1280+'px',
            'height':size.height*60/2272+'px',
            'left':size.width*743/1280+'px',
            'top':size.height*2074/2272+'px',
            'z-index':'2'
         })
         $('#collect-badge-3').css({
            'position':'absolute',  
            'width':size.width*73/1280+'px',
            'height':size.height*83/2272+'px',
            'left':size.width*1015/1280+'px',
            'top':size.height*2061/2272+'px',
            'z-index':'2'
         })



         $('#pic-book1').on('click',function(){
            window.location.href='./book1-history-start.html';
         })
         $('#pic-book2').on('click',function(){
            window.location.href='./book2.html';
         })
         $('#pic-book3').on('click',function(){
            window.location.href='./book3.html';
         })
         var light=0;//默认背景是亮的，1为暗
        $('#info-book1').on('click',function(){
            $('#book1-info').toggle();
            if(light==0){$('.bookshowpage').addClass('black-bg');light=1;}
         })
         $('#book1-info').on('click',function(){
            $('#book1-info').toggle();
            light=0;
            $('.bookshowpage').removeClass('black-bg');
         })

         $('#info-book2').on('click',function(){
            $('#book2-info').toggle();
            if(light==0){$('.bookshowpage').addClass('black-bg');light=1;}
         })
         $('#book2-info').on('click',function(){
            $('#book2-info').toggle();
            light=0;
            $('.bookshowpage').removeClass('black-bg');
         })

         $('#info-book3').on('click',function(){
            $('#book3-info').toggle();
            if(light==0){$('.bookshowpage').addClass('black-bg');light=1;}
        })
         $('#book3-info').on('click',function(){
            $('#book3-info').toggle();
            light=0;
            $('.bookshowpage').removeClass('black-bg');
         })


        //  --------------------------------------------------下面的徽章跳转：使用查询参数------------------------------
        function getQueryParams() {
            var params = {};
            var queryString = window.location.search.substring(1);
            var vars = queryString.split('&');
            for (var i = 0; i < vars.length; i++) {
                var pair = vars[i].split('=');
                params[pair[0]] = decodeURIComponent(pair[1]);
            }
            return params;
        }
        var params = getQueryParams();
        console.log(params);
        if (params.from === 'book1-end-success.html'|| localStorage.getItem('book1-params')=='book1-end-success.html') {
            // 存储数据
            localStorage.setItem('book1-params', params.from);
            $('#collect-badge-1').show();
        } 
        if( params.from === 'book2-end-success.html'|| localStorage.getItem('book2-params')=='book2-end-success.html'){
            // 存储数据
            localStorage.setItem('book2-params', params.from);
            $('#collect-badge-2').show();
        }
        if(params.from ==='book3-end-success.html'|| localStorage.getItem('book3-params')=='book3-end-success.html'){
            // 存储数据
            localStorage.setItem('book3-params', params.from);
            $('#collect-badge-3').show();
        }



        })
        window.onload=function(){
            var carousel = document.querySelector('#carousel');
            var slides = document.querySelectorAll('#carousel li');
            var currentIndex = 0;
            var slideWidth = document.querySelector('#carousel li').offsetWidth;
            var isDragging = false;
            var startTouch = null;
            var autoPlayTimer = null;

            function slide() {
                if (currentIndex >= slides.length - 1) {
                    currentIndex = 0;
                    carousel.style.transform = `translateX(0)`;
                } else {
                    currentIndex++;
                    carousel.style.transform = `translateX(-${currentIndex * slideWidth}px)`;
                }
            }
            function startAutoPlay() {
                autoPlayTimer = setInterval(function() {
                    if (!isDragging) {
                        slide();
                    }
                }, 3000);
            }

            function stopAutoPlay() {
                clearTimeout(autoPlayTimer);
            }

            startAutoPlay();

            carousel.addEventListener('touchstart', function(e) {
                isDragging = true;
                stopAutoPlay();
                var touchObj = e.changedTouches[0];
                startTouch = {
                    x: touchObj.clientX,
                };
                carousel.style.transition = 'none'; // 阻止动画
            }, false);

            carousel.addEventListener('touchmove', function(e) {
                if (!isDragging) return;
                var touchObj = e.changedTouches[0];
                var endX = touchObj.clientX;
                var diffX = endX - startTouch.x;
                if (Math.abs(diffX) > 50) { // 确定是左右滑动
                    e.preventDefault(); // 阻止默认事件
                    carousel.style.transition = 'none'; // 阻止动画
                    carousel.style.transform = `translateX(-${(currentIndex * slideWidth) - diffX}px)`;
                }
            }, false);

            carousel.addEventListener('touchend', function(e) {
                if (!isDragging) return;
                var touchObj = e.changedTouches[0];
                var endX = touchObj.clientX;
                var diffX = endX - startTouch.x;
                if (Math.abs(diffX) > 50) {
                    if (diffX > 0 && currentIndex > 0) { // 向右滑动
                    currentIndex--;
                    } else if (diffX < 0 && currentIndex < slides.length - 1) { // 向左滑动
                    currentIndex++;
                    }
                    carousel.style.transition = 'transform 0.5s ease-in-out';
                    carousel.style.transform = `translateX(-${currentIndex * slideWidth}px)`;
                } else {
                    // 慢速滑动，回弹
                    carousel.style.transition = 'transform 0.5s ease-in-out';
                    carousel.style.transform = `translateX(-${currentIndex * slideWidth}px)`;
                }

                isDragging = false;
                startAutoPlay();
            }, false);

            carousel.addEventListener('touchcancel', function() {
                if (!isDragging) return;
                isDragging = false;
                startAutoPlay();
            }, false);
        }

        
      </script>
</body>
</html>
